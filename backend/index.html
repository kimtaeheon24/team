<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태헌님의 맛집 지도</title> 
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=008785773c36ce63a3340655b913ab62&libraries=services"></script>

    <style>
        body { font-family: "Pretendard", -apple-system, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background-color: #f8f9fa; }
        #map { width: 100%; height: 450px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .search-container { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 14px; border: 1px solid #dee2e6; border-radius: 10px; font-size: 16px; }
        button { padding: 12px 24px; background-color: #fee500; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #auth-bar { background: white; padding: 15px 20px; margin-bottom: 25px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
        .detail-box { background: white; padding: 30px; border-radius: 20px; margin-top: 25px; border: 1px solid #eee; }
        #placesList { max-height: 150px; overflow-y: auto; background: white; border-radius: 12px; margin-bottom: 20px; padding: 0; }
        #placesList li { list-style: none; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="auth-bar">
        <span id="user-status" style="font-weight: 600;">접속 중...</span>
        <div>
            <button id="loginBtn" onclick="login()">로그인</button>
            <button id="logoutBtn" onclick="logout()" style="display:none; background-color: #adb5bd; color: white;">로그아웃</button>
        </div>
    </div>

    <h2 style="margin-bottom: 25px;">📍 수현님의 맛집 지도</h2>

    <div class="search-container">
        <input type="text" id="keyword" placeholder="맛집을 검색하세요!">
        <button onclick="searchPlaces()">🔍 검색</button>
    </div>

    <ul id="placesList"></ul>
    <div id="map"></div>

    <div class="detail-box" id="detailSection">
        <h3 id="placeTitle">💡 장소를 선택해 주세요</h3>
        <div id="reviewSection">
            <p>별점: <span id="avgRating">0.0</span> | 리뷰: <span id="reviewCount">0</span>개</p>
            <ul id="reviewList"></ul>
        </div>
    </div>

    <script>
        // [중요] 테라폼 변수 주입 구간
        // 배포 후 소스보기에서 이 자리에 실제 값이 들어있는지 꼭 확인하세요!
        const BASE_URL = "${BASE_URL}"; 
        const COGNITO_POOL_ID = "${COGNITO_POOL}";
        const CLIENT_ID = "${clientId}";

        const poolData = { UserPoolId: COGNITO_POOL_ID, ClientId: CLIENT_ID };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        let map, ps, infowindow, currentPlace;
        let loggedInUserId = "guest_user";

        window.onload = function() {
            initMap();
            checkAuth();
        };

        // 1. 지도 초기화
        function initMap() {
            const container = document.getElementById('map');
            map = new kakao.maps.Map(container, {
                center: new kakao.maps.LatLng(37.5665, 126.9780),
                level: 3
            });
            ps = new kakao.maps.services.Places();
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
            
            // 초기 마커 로드 (DB 데이터)
            loadSavedMarkers();
        }

        // 2. 인증 체크
        function checkAuth() {
            const hash = window.location.hash;
            if (hash.includes("id_token=")) {
                const params = new URLSearchParams(hash.substring(1));
                const idToken = params.get("id_token");
                const payload = JSON.parse(atob(idToken.split('.')[1]));
                loggedInUserId = payload.email || payload['cognito:username'];
                updateUI(true);
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                const user = userPool.getCurrentUser();
                if (user) {
                    user.getSession((err, session) => {
                        if (!err && session.isValid()) {
                            loggedInUserId = user.username;
                            updateUI(true);
                        } else { updateUI(false); }
                    });
                } else { updateUI(false); }
            }
        }

        function updateUI(isLogin) {
            document.getElementById('user-status').innerText = isLogin ? `👋 $$${loggedInUserId}님 환영합니다!` : "로그인이 필요합니다.";
            document.getElementById('loginBtn').style.display = isLogin ? "none" : "block";
            document.getElementById('logoutBtn').style.display = isLogin ? "block" : "none";
        }

        function login() {
            const domain = "kakaomap-auth-c9dfb91a.auth.ap-northeast-2.amazoncognito.com";
            const redirectUri = "${redirectUri}";
            location.href = `https://$$${domain}/login?client_id=$$${CLIENT_ID}&response_type=token&scope=email+openid+profile&redirect_uri=$$${encodeURIComponent(redirectUri)}`;
        }

        function logout() {
            const user = userPool.getCurrentUser();
            if (user) user.signOut();
            location.reload();
        }

        // 3. 검색 및 마커 로직
        function searchPlaces() {
            const kw = document.getElementById('keyword').value;
            if (!kw) return alert("검색어를 입력하세요!");
            ps.keywordSearch(kw, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    const list = document.getElementById('placesList');
                    list.innerHTML = "";
                    const bounds = new kakao.maps.LatLngBounds();
                    data.forEach(p => {
                        const li = document.createElement('li');
                        li.innerHTML = `<span><strong>$$${p.place_name}</strong></span> <button onclick="selectPlace('$$${p.id}','$$${p.place_name}',$$${p.y},$$${p.x})">선택</button>`;
                        list.appendChild(li);
                        bounds.extend(new kakao.maps.LatLng(p.y, p.x));
                    });
                    map.setBounds(bounds);
                }
            });
        }

        async function loadSavedMarkers() {
            try {
                const res = await fetch(`$$${BASE_URL}/restaurants`);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(p => {
                        const marker = new kakao.maps.Marker({
                            map: map,
                            position: new kakao.maps.LatLng(p.lat, p.lng)
                        });
                        kakao.maps.event.addListener(marker, 'click', () => selectPlace(p.place_id, p.name, p.lat, p.lng));
                    });
                }
            } catch(e) { console.log("기존 마커 로드 실패"); }
        }

        function selectPlace(id, name, lat, lng) {
            currentPlace = { id, name, lat, lng };
            document.getElementById('placeTitle').innerText = `📍 $$${name}`;
            map.panTo(new kakao.maps.LatLng(lat, lng));
            // 리뷰 로드 함수 호출 등 추가 가능
        }
    </script>
</body>
</html>
