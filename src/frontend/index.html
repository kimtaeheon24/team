<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>맛집 지도</title>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aws-amplify@4.3.43/dist/aws-amplify.min.js"></script>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=008785773c36ce63a3340655b913ab62&libraries=services"></script>

<style>
body { font-family: Arial; margin:20px; }
#map { width:100%; height:400px; margin-bottom:20px; }
.panel { border:1px solid #ddd; padding:10px; margin-top:10px; }
#placesList { padding-left: 18px; }
#placesList li { margin-bottom: 6px; }
#reviews > div { margin-bottom: 10px; }
</style>
</head>

<body>

<h2>📍 맛집 지도</h2>

<div>
  <button onclick="login()">로그인</button>
  <button onclick="logout()">로그아웃</button>
  <span id="user"></span>
</div>

<input type="text" id="keyword" placeholder="장소 검색">
<button onclick="searchPlaces()">검색</button>
<ul id="placesList"></ul>

<div id="map"></div>

<div class="panel" id="detail" style="display:none;">
  <h3 id="placeName"></h3>
  <p>🔥 찜 수: <span id="bookmarkCount">0</span></p>

  <button onclick="toggleBookmark()">⭐ 찜하기 / 취소</button>

  <hr>

  <h4>리뷰 작성</h4>
  <input id="rating" type="number" min="1" max="5" placeholder="별점">
  <input id="comment" placeholder="리뷰">
  <button onclick="postReview()">등록</button>

  <hr>

  <h4>리뷰 목록</h4>
  <div id="reviews"></div>
</div>

<script>
const Amplify = window.aws_amplify.Amplify;
const Auth = window.aws_amplify.Auth;

Amplify.configure({
  Auth: {
    region: 'ap-northeast-2',
    userPoolId: window.APP_CONFIG.USER_POOL_ID,
    userPoolWebClientId: window.APP_CONFIG.CLIENT_ID,
    oauth: {
      domain: window.APP_CONFIG.AUTH_DOMAIN,
      scope: ['email','openid','profile'],
      redirectSignIn: window.APP_CONFIG.REDIRECT_SIGN_IN,
      redirectSignOut: window.APP_CONFIG.REDIRECT_SIGN_OUT,
      responseType: 'token'
    }
  }
});

const API_URL = window.APP_CONFIG.API_BASE_URL;

let map;
let ps;
let selectedPlace = null;
let markers = [];
let restaurantData = [];

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 3
  });

  ps = new kakao.maps.services.Places();
  loadRegisteredPlaces();
}

function login() {
  Auth.federatedSignIn();
}

async function logout() {
  await Auth.signOut();
  location.reload();
}

async function checkUser() {
  try {
    const session = await Auth.currentSession();
    const payload = session.getIdToken().decodePayload();
    document.getElementById('user').innerText = payload.email;
  } catch (e) {
    document.getElementById('user').innerText = '';
  }
}

async function getAuthHeader() {
  const session = await Auth.currentSession();
  const token = session.getIdToken().getJwtToken();
  return {
    Authorization: `Bearer ${token}`
  };
}

function searchPlaces() {
  const keyword = document.getElementById('keyword').value;

  if (!keyword.trim()) {
    alert("검색어 입력");
    return;
  }

  ps.keywordSearch(keyword, (data, status) => {
    if (status === kakao.maps.services.Status.OK) {
      displayPlaces(data);
    }
  });
}

function displayPlaces(places) {
  const list = document.getElementById('placesList');
  list.innerHTML = '';

  places.forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `
      ${p.place_name}
      <button onclick='selectSearchPlace(${JSON.stringify(p)})'>선택</button>
    `;
    list.appendChild(li);
  });
}

function selectSearchPlace(p) {
  const existingPlace = restaurantData.find(
    r => String(r.place_id) === String(p.id)
  );

  if (existingPlace) {
    selectedPlace = existingPlace;
  } else {
    selectedPlace = {
      place_id: String(p.id),
      name: p.place_name,
      address: p.address_name || p.road_address_name,
      category: p.category_group_name,
      lat: p.y,
      lng: p.x,
      bookmark_count: 0
    };
  }

  document.getElementById('detail').style.display = 'block';
  document.getElementById('placeName').innerText = selectedPlace.name;
  document.getElementById('bookmarkCount').innerText = selectedPlace.bookmark_count || 0;

  loadReviews(selectedPlace.place_id);
  map.setCenter(new kakao.maps.LatLng(Number(selectedPlace.lat), Number(selectedPlace.lng)));
}

async function loadRegisteredPlaces() {
  markers.forEach(m => m.setMap(null));
  markers = [];

  const res = await fetch(`${API_URL}/restaurants`);
  const data = await res.json();

  restaurantData = data;

  data.forEach(p => {
    const marker = new kakao.maps.Marker({
      map,
      position: new kakao.maps.LatLng(Number(p.lat), Number(p.lng))
    });

    kakao.maps.event.addListener(marker, 'click', () => {
      selectPlace(p);
    });

    markers.push(marker);
  });

  return data;
}

function selectPlace(place) {
  selectedPlace = place;

  document.getElementById('detail').style.display = 'block';
  document.getElementById('placeName').innerText = place.name;
  document.getElementById('bookmarkCount').innerText = place.bookmark_count || 0;

  loadReviews(place.place_id);
}

async function toggleBookmark() {
  try {
    const auth = await getAuthHeader();

    const res = await fetch(`${API_URL}/bookmarks`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...auth
      },
      body: JSON.stringify({
        place_id: selectedPlace.place_id,
        name: selectedPlace.name,
        address: selectedPlace.address,
        category: selectedPlace.category,
        lat: selectedPlace.lat,
        lng: selectedPlace.lng
      })
    });

    const data = await res.json();
    alert(data.message);

    const places = await loadRegisteredPlaces();
    const updatedPlace = places.find(
      p => String(p.place_id) === String(selectedPlace.place_id)
    );

    if (updatedPlace) {
      selectedPlace = updatedPlace;
      selectPlace(updatedPlace);
    } else {
      document.getElementById('bookmarkCount').innerText = 0;
    }

  } catch (e) {
    console.error(e);
    alert("로그인 필요");
  }
}

async function postReview() {
  try {
    const auth = await getAuthHeader();

    const res = await fetch(`${API_URL}/reviews`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...auth
      },
      body: JSON.stringify({
        place_id: selectedPlace.place_id,
        rating: Number(document.getElementById('rating').value),
        comment: document.getElementById('comment').value
      })
    });

    if (!res.ok) {
      const err = await res.json();
      console.error(err);
      alert(err.error || "리뷰 등록 실패");
      return;
    }

    document.getElementById('rating').value = '';
    document.getElementById('comment').value = '';
    loadReviews(selectedPlace.place_id);

  } catch (e) {
    console.error(e);
    alert("로그인 필요");
  }
}

async function loadReviews(placeId) {
  const res = await fetch(`${API_URL}/reviews?place_id=${placeId}`);
  const data = await res.json();

  const el = document.getElementById('reviews');
  el.innerHTML = '';

  data.forEach(r => {
    const div = document.createElement('div');
    div.innerHTML = `
      ${r.user_email || '익명'} ⭐${r.rating}<br>
      ${r.comment}
      <button onclick="deleteReview('${r.review_id}')">삭제</button>
      <hr>
    `;
    el.appendChild(div);
  });
}

async function deleteReview(id) {
  try {
    const auth = await getAuthHeader();

    const res = await fetch(`${API_URL}/reviews`, {
      method: 'DELETE',
      headers: {
        'Content-Type': 'application/json',
        ...auth
      },
      body: JSON.stringify({
        place_id: selectedPlace.place_id,
        review_id: id
      })
    });

    if (!res.ok) {
      const err = await res.json();
      console.error(err);
      alert(err.error || "삭제 실패");
      return;
    }

    loadReviews(selectedPlace.place_id);

  } catch (e) {
    console.error(e);
    alert("삭제 실패");
  }
}

window.onload = () => {
  initMap();
  checkUser();
};
</script>

</body>
</html>
